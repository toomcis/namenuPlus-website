<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — ToMenu</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Fraunces:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
  <script>
    const LOCALES_404 = {
      sk: {
        headline: 'Toto jedlo sme nenašli.',
        sub: 'Stránka, ktorú hľadáš, tu nie je — možno bola presunutá, alebo nikdy neexistovala.',
        home: 'Späť domov',
        api: 'API docs',
      },
      en: {
        headline: "This dish doesn't exist.",
        sub: "The page you're looking for isn't here — it may have moved or never existed.",
        home: 'Back home',
        api: 'API docs',
      },
      cs: {
        headline: 'Toto jídlo jsme nenašli.',
        sub: 'Stránka, kterou hledáš, tu není — možná byla přesunuta, nebo nikdy neexistovala.',
        home: 'Zpět domů',
        api: 'API docs',
      },
    };
    const LANGS = ['sk', 'en', 'cs'];
    let currentLang = localStorage.getItem('tomenu_lang') || 'sk';

    function applyLang(lang) {
      currentLang = lang;
      localStorage.setItem('tomenu_lang', lang);
      document.documentElement.lang = lang;
      const t = LOCALES_404[lang];
      document.getElementById('txt-headline').textContent = t.headline;
      document.getElementById('txt-sub').textContent = t.sub;
      document.getElementById('txt-home').textContent = t.home;
      document.getElementById('txt-api').textContent = t.api;
      document.getElementById('lang-btn').textContent = lang.toUpperCase();
    }

    function cycleLang() {
      const next = LANGS[(LANGS.indexOf(currentLang) + 1) % LANGS.length];
      applyLang(next);
    }

    document.addEventListener('DOMContentLoaded', () => applyLang(currentLang));
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0e0d;
      --bg1:     #131715;
      --bg2:     #181c1a;
      --border:  #252b27;
      --green:   #3d9e5f;
      --green2:  #2d7a47;
      --text:    #e8ede9;
      --text2:   #8fa092;
      --text3:   #4a5550;
      --serif:   'Fraunces', Georgia, serif;
      --sans:    'DM Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* ── Animated grid background ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 100%);
      opacity: 0.4;
      animation: gridDrift 20s linear infinite;
    }
    @keyframes gridDrift {
      0%   { background-position: 0 0; }
      100% { background-position: 48px 48px; }
    }

    /* ── Glow orb ── */
    .orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(61,158,95,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: orbPulse 4s ease-in-out infinite;
    }
    @keyframes orbPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
      50%       { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; }
    }

    /* ── Main layout ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 0;
    }

    /* ── Big 404 ── */
    .big-number {
      font-family: var(--serif);
      font-size: clamp(120px, 22vw, 220px);
      font-weight: 900;
      line-height: 0.85;
      color: transparent;
      -webkit-text-stroke: 2px var(--green2);
      letter-spacing: -8px;
      position: relative;
      animation: fadeUp 0.7s ease both;
      user-select: none;
    }
    .big-number::after {
      content: '404';
      position: absolute;
      inset: 0;
      color: var(--green);
      -webkit-text-stroke: 0;
      opacity: 0.06;
      transform: translate(6px, 6px);
    }

    /* ── Plate emoji ── */
    .plate {
      font-size: clamp(48px, 10vw, 72px);
      margin: 16px 0 24px;
      animation: fadeUp 0.7s 0.1s ease both, wobble 3s 1s ease-in-out infinite;
      display: block;
      filter: drop-shadow(0 0 20px rgba(61,158,95,0.4));
    }
    @keyframes wobble {
      0%, 100% { transform: rotate(-3deg) scale(1); }
      50%       { transform: rotate(3deg) scale(1.05); }
    }

    .headline {
      font-family: var(--serif);
      font-size: clamp(24px, 5vw, 40px);
      font-weight: 900;
      font-style: italic;
      color: #fff;
      margin-bottom: 12px;
      animation: fadeUp 0.7s 0.2s ease both;
      line-height: 1.1;
    }

    .sub {
      font-size: 15px;
      color: var(--text2);
      max-width: 340px;
      line-height: 1.6;
      animation: fadeUp 0.7s 0.3s ease both;
      margin-bottom: 36px;
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--green);
      color: #fff;
      box-shadow: 0 0 0 0 rgba(61,158,95,0.4);
    }
    .btn-primary:hover {
      background: #4ab870;
      box-shadow: 0 0 24px rgba(61,158,95,0.35);
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: var(--bg2);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text3);
      transform: translateY(-2px);
    }

    /* ── Breadcrumb trail ── */
    .breadcrumb {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.5px;
      animation: fadeUp 0.7s 0.6s ease both;
      white-space: nowrap;
    }
    .breadcrumb a { color: var(--text3); text-decoration: none; }
    .breadcrumb a:hover { color: var(--text2); }
    .breadcrumb span { margin: 0 6px; opacity: 0.5; }

    /* ── Logo top left ── */
    .logo {
      position: fixed;
      top: 24px;
      left: 28px;
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 900;
      color: var(--green);
      text-decoration: none;
      letter-spacing: -0.5px;
      animation: fadeUp 0.5s ease both;
    }
    .logo:hover { color: #4ab870; }

    .lang-toggle {
      position: fixed;
      top: 24px;
      right: 28px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      animation: fadeUp 0.5s ease both;
      transition: color 0.15s, border-color 0.15s;
    }
    .lang-toggle:hover { color: var(--text); border-color: var(--text3); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .big-number { letter-spacing: -4px; }
      .btn { padding: 11px 20px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="orb"></div>

  <a class="logo" href="/">ToMenu</a>
  <button class="lang-toggle" id="lang-btn" onclick="cycleLang()">SK</button>

  <main class="page">
    <div class="big-number">404</div>
    <span class="plate">🍽️</span>
    <h1 class="headline" id="txt-headline">Toto jedlo sme nenašli.</h1>
    <p class="sub" id="txt-sub">Stránka, ktorú hľadáš, tu nie je — možno bola presunutá, alebo nikdy neexistovala.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
        <span id="txt-home">Späť domov</span>
      </a>
      <a href="/api" class="btn btn-ghost">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>
        <span id="txt-api">API docs</span>
      </a>
    </div>
  </main>

  <p class="breadcrumb">
    <a href="/">tomenu.sk</a>
    <span>/</span>
    <span style="color: var(--text2);">404</span>
  </p>

</body>
</html>
